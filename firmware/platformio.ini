; PlatformIO — firmware del carrito (ESP32 + micro-ROS)
;
; Recuerda actualizar en src/main.cpp:
;   - ssid / password de tu red WiFi
;   - agent_ip: la IP del PC donde corre el micro-ros-agent (docker host)
;   - agent_port: debe coincidir con MICRO_ROS_AGENT_PORT del .env (8888)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Librería micro-ROS para Arduino.
; Usa la rama que corresponda a la distro del agent (jazzy).
lib_deps =
    https://github.com/micro-ROS/micro_ros_arduino.git#jazzy
